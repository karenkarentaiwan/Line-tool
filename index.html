function parseLineExport(raw) {
  const dayMap = new Map();
  const dateRe = /^(\d{4}[\/\.\-]\d{1,2}[\/\.\-]\d{1,2})/;
  const msgRe = /^(?:上午|下午)?\s*\d{1,2}:\d{2}\s+(.+?)\s{2,}(.+)$/;
  const msgRe2 = /^\d{2}:\d{2}\t(.+?)\t(.+)$/;
  let currentDate = null;
  for (const line of raw.split("\n")) {
    const trimmed = line.trim();
    if (!trimmed) continue;
    const dMatch = trimmed.match(dateRe);
    if (dMatch) { currentDate = dMatch[1].replace(/[\.\-]/g, "/"); if (!dayMap.has(currentDate)) dayMap.set(currentDate, { messages: [], senders: new Set() }); continue; }
    if (!currentDate) continue;
    const m = trimmed.match(msgRe) || trimmed.match(msgRe2);
    if (m) {
      const sender = m[1].trim(); const text = m[2].trim();
      if (text && !["已收回訊息","傳送貼圖","傳送圖片","傳送影片","傳送檔案","通話"].some(s => text.includes(s))) {
        dayMap.get(currentDate).messages.push({ sender, text, date: currentDate });
        dayMap.get(currentDate).senders.add(sender);
      }
    }
  }
  return dayMap;
}

// 偵測一段文字裡出現哪些 AI 工具
function detectAITools(text) {
  const found = [];
  const lowerText = text.toLowerCase();
  for (const tool of AI_TOOLS_DB) {
    if (lowerText.includes(tool.name.toLowerCase())) {
      found.push(tool);
    }
  }
  return found;
}

function getTopicMessages(messages, topicWords) {
  const result = []; const matched = new Set();
  messages.forEach((msg, idx) => {
    if (topicWords.some(w => msg.text.includes(w))) {
      for (let i = Math.max(0, idx-2); i <= Math.min(messages.length-1, idx+2); i++) matched.add(i);
    }
  });
  let group = []; let lastIdx = -2;
  Array.from(matched).sort((a,b)=>a-b).forEach(idx => {
    if (idx > lastIdx+1 && group.length) { result.push({ date: group[0].date||"", messages: group }); group = []; }
    group.push(messages[idx]); lastIdx = idx;
  });
  if (group.length) result.push({ date: group[0].date||"", messages: group });
  return result;
}

// 從對話中動態生成主題分類（高頻詞聚類）
const TOPIC_STOP = new Set(["的","了","是","我","你","他","她","它","們","在","有","也","都","和","就","不","很","這","那","說","要","會","可以","但是","因為","所以","如果","還是","已經","一個","什麼","這樣","這個","那個","還有","然後","其實","覺得","感覺","看到","知道","應該","可能","沒有","為什麼","怎麼","大家","一下","今天","昨天","明天","時候","就是","真的","好像","不是","沒有","還是","自己","一起","一樣","可能","所以","然後","已經","只是","其實","好的","謝謝","不會","覺得","哈哈","嗯嗯","對啊","好啊","來","去","做","用","有","說","看","想","讓","把","被","跟","跟","從"]);
const TOPIC_EMOJIS = ["🔵","🟡","🟠","🟣","🔴","🟢","🟤","⚪","🔶","🔷"];

function buildDynamicTopics(messages) {
  // 1. 統計所有詞頻
  const freq = {};
  for (const msg of messages) {
    const words = msg.text
      .replace(/https?:\/\/\S+/g, "") // 移除網址
      .replace(/[^一-鿿\w]/g, " ")
      .split(/\s+/)
      .filter(w => w.length >= 2 && !TOPIC_STOP.has(w) && !/^\d+$/.test(w));
    for (const w of words) freq[w] = (freq[w] || 0) + 1;
  }

  // 2. 取出高頻詞（至少出現3次）
  const hotWords = Object.entries(freq)
    .filter(([, c]) => c >= 3)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 60)
    .map(([w]) => w);

  if (hotWords.length === 0) return [];

  // 3. 把相關詞聚在一起：兩個詞在同一則訊息出現視為相關
  const coMatrix = {};
  for (const msg of messages) {
    const msgWords = hotWords.filter(w => msg.text.includes(w));
    for (let i = 0; i < msgWords.length; i++) {
      for (let j = i+1; j < msgWords.length; j++) {
        const key = msgWords[i] < msgWords[j] ? msgWords[i]+"||"+msgWords[j] : msgWords[j]+"||"+msgWords[i];
        coMatrix[key] = (coMatrix[key] || 0) + 1;
      }
    }
  }

  // 4. 簡單聚類：用共現次數最高的詞對為種子，擴展成群組
  const assigned = new Set();
  const clusters = [];

  for (const seed of hotWords) {
    if (assigned.has(seed)) continue;
    // 找和 seed 最常共現的詞
    const related = hotWords
      .filter(w => w !== seed && !assigned.has(w))
      .map(w => {
        const key = seed < w ? seed+"||"+w : w+"||"+seed;
        return { w, score: coMatrix[key] || 0 };
      })
      .filter(x => x.score >= 2)
      .sort((a, b) => b.score - a.score)
      .slice(0, 5)
      .map(x => x.w);

    const clusterWords = [seed, ...related];
    clusterWords.forEach(w => assigned.add(w));

    // 用群組裡出現最多次的詞當主題名稱
    const titleWord = clusterWords.sort((a,b) => (freq[b]||0)-(freq[a]||0))[0];
    const convGroups = getTopicMessages(messages, clusterWords);
    if (convGroups.length === 0) continue;

    // 偵測這個主題群組的對話裡出現哪些 AI 工具
    const clusterText = convGroups.flatMap(g => g.messages.map(m => m.text)).join(" ");
    const aiToolsFound = detectAITools(clusterText);

    clusters.push({
      title: titleWord + " 相關討論",
      emoji: TOPIC_EMOJIS[clusters.length % TOPIC_EMOJIS.length],
      keywords: clusterWords.slice(0, 4),
      count: clusterWords.reduce((acc, w) => acc + (freq[w]||0), 0),
      convGroups,
      messageCount: convGroups.reduce((a, g) => a + g.messages.length, 0),
      description: "高頻關鍵字：" + clusterWords.slice(0,3).join("、") + " 等，共 " + convGroups.length + " 段對話",
      aiTools: aiToolsFound,
    });

    if (clusters.length >= 6) break;
  }

  // ── AI 工具強制主題：只要出現就建立，不受頻率門檻限制 ──
  const allMsgText = messages.map(m => m.text).join(" ");
  const foundTools = detectAITools(allMsgText);

  if (foundTools.length > 0) {
    // 把偵測到的工具依 tags[0] 分組，例如同為「AI影片」的放一組
    const toolGroups = {};
    for (const tool of foundTools) {
      const groupKey = tool.tags[0];
      if (!toolGroups[groupKey]) toolGroups[groupKey] = [];
      toolGroups[groupKey].push(tool);
    }

    for (const [groupKey, tools] of Object.entries(toolGroups)) {
      const toolNames = tools.map(t => t.name);
      // 用工具名稱找相關對話（不設頻率門檻）
      const convGroups = getTopicMessages(messages, toolNames);
      if (convGroups.length === 0) continue;

      // 檢查這個群組是否已被動態主題涵蓋
      const alreadyCovered = clusters.some(c =>
        toolNames.some(name => c.keywords.some(kw => kw.toLowerCase().includes(name.toLowerCase())))
      );
      if (alreadyCovered) continue;

      const groupEmoji = tools[0].color ? "🤖" : "💡";
      clusters.push({
        title: groupKey + " 工具討論",
        emoji: groupEmoji,
        keywords: toolNames.slice(0, 4),
        count: toolNames.reduce((acc, name) => acc + (allMsgText.toLowerCase().split(name.toLowerCase()).length - 1), 0),
        convGroups,
        messageCount: convGroups.reduce((a, g) => a + g.messages.length, 0),
        description: "偵測到工具：" + toolNames.join("、") + "，共 " + convGroups.length + " 段對話",
        aiTools: tools,
        isAIForced: true, // 標記為強制建立
      });
    }
  }

  return clusters;
}

function analyzeLocally(dayData, dayKey) {
  const { messages, senders } = dayData;
  if (!messages.length) return null;
  const allText = messages.map(m => m.text).join(" ");
  const totalMessages = messages.length;
  const participantCount = senders.size;
  // 動態從對話中自動生成主題分類
  const dynamicTopics = buildDynamicTopics(messages);
  // 若動態分類太少，補充預設分類
  const topicScores = dynamicTopics.length >= 2 ? dynamicTopics : (() => {
    const customTopics = loadCustomTopics();
    const allTopics = [...TOPIC_KEYWORDS, ...customTopics];
    return allTopics.map(t => {
      const count = t.words.reduce((acc,w) => acc+(allText.split(w).length-1), 0);
      const matchedWords = t.words.filter(w => allText.includes(w)).slice(0,4);
      const convGroups = getTopicMessages(messages, t.words);
      return { ...t, count, keywords: matchedWords, convGroups };
    }).filter(t => t.count > 0).sort((a,b) => b.count-a.count).slice(0,5);
  })();
  const moodScores = MOOD_RULES.map(r => ({ ...r, count: r.words.reduce((acc,w)=>acc+(allText.split(w).length-1),0) })).sort((a,b)=>b.count-a.count);
  const topMood = moodScores[0]?.count > 0 ? moodScores[0] : { mood:"一般交流", emoji:"💬" };
  const stopWords = new Set(["的","了","是","我","你","他","她","它","們","在","有","也","都","和","就","不","很","這","那","說","要","會","可以","但是","因為","所以","如果","還是","已經","一個","什麼","這樣","這個","那個","還有","然後","其實","覺得","感覺","看到","知道","應該","可能","沒有","為什麼","怎麼"]);
  const wordFreq = {};
  for (const msg of messages) {
    msg.text.replace(/[^\u4e00-\u9fff\w]/g," ").split(/\s+/).filter(w=>w.length>=2&&!stopWords.has(w)).forEach(w => { wordFreq[w]=(wordFreq[w]||0)+1; });
  }
  const topWords = Object.entries(wordFreq).sort((a,b)=>b[1]-a[1]).slice(0,8).map(([w])=>w);
  const senderCount = {};
  for (const m of messages) senderCount[m.sender] = (senderCount[m.sender]||0)+1;
  const topSenders = Object.entries(senderCount).sort((a,b)=>b[1]-a[1]).slice(0,3);
  const topicNames = topicScores.slice(0,2).map(t=>t.title).join("、")||"日常話題";
  const summary = `${dayKey} 共有 ${participantCount} 人參與，交流了 ${totalMessages} 則訊息。`+(topicScores.length?`主要討論${topicNames}等話題。`:"")+`整體氛圍${topMood.mood}。`;
  const highlights = [];
  if (topSenders.length) highlights.push(`最活躍成員：${topSenders.map(([s,c])=>s+"（"+c+"則）").join("、")}`);
  if (topWords.length) highlights.push(`熱門關鍵字：${topWords.slice(0,5).join("、")}`);
  if (topicScores.length) highlights.push(`討論最多：${topicScores[0].title}（命中 ${topicScores[0].count} 次）`);
  highlights.push(`平均每人發言 ${Math.round(totalMessages/Math.max(participantCount,1))} 則`);
  return {
    summary, highlights, mood: topMood.mood, moodEmoji: topMood.emoji,
    participantCount, totalMessages, topWords, topSenders,
    topics: topicScores.length ? topicScores.map(t=>({
      title:t.title, emoji:t.emoji,
      description:`命中關鍵字 ${t.count} 次，共 ${t.convGroups.length} 段相關對話`,
      messageCount:t.convGroups.reduce((a,g)=>a+g.messages.length,0),
      keywords:t.keywords.length?t.keywords:[t.words[0]], convGroups:t.convGroups,
    })) : [{ title:"日常交流", emoji:"💬", description:"多元話題討論", messageCount:totalMessages, keywords:topWords.slice(0,3), convGroups:[] }],
  };
}

function ConvDrawer({ topic, color, onClose }) {
  const groups = topic.convGroups || [];
  const byDate = {};
  groups.forEach(g => { const d = g.date||"未知日期"; if (!byDate[d]) byDate[d]=[]; byDate[d].push(g); });
  return (
    <div style={{ position:"fixed", inset:0, zIndex:100, display:"flex", flexDirection:"column" }}>
      <div style={{ position:"absolute", inset:0, background:"rgba(0,0,0,0.7)" }} onClick={onClose} />
      <div style={{ position:"relative", marginTop:"auto", background:"#161b22", borderRadius:"16px 16px 0 0", maxHeight:"82vh", display:"flex", flexDirection:"column" }}>
        <div style={{ display:"flex", alignItems:"center", gap:10, padding:"16px 20px 12px", borderBottom:"1px solid #21262d", flexShrink:0 }}>
          <span style={{ fontSize:22 }}>{topic.emoji}</span>
          <div style={{ flex:1 }}>
            <div style={{ fontWeight:700, fontSize:16 }}>{topic.title}</div>
            <div style={{ fontSize:12, color:"#8b949e" }}>{groups.length} 段對話・{topic.messageCount} 則</div>
          </div>
          <button onClick={onClose} style={{ background:"#21262d", border:"none", color:"#e6edf3", borderRadius:"50%", width:32, height:32, fontSize:18, cursor:"pointer" }}>×</button>
        </div>
        <div style={{ padding:"10px 20px", borderBottom:"1px solid #21262d", flexShrink:0 }}>
          <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom: topic.aiTools?.length ? 8 : 0 }}>
            {(topic.keywords||[]).map((kw,i) => <span key={i} style={{ background:color+"22", color, borderRadius:12, padding:"3px 10px", fontSize:12 }}>#{kw}</span>)}
          </div>
          {topic.aiTools?.length > 0 && (
            <div style={{ display:"flex", flexWrap:"wrap", gap:5, paddingTop: 6 }}>
              <span style={{ fontSize:10, color:"#6e7681", alignSelf:"center", marginRight:2 }}>🤖</span>
              {topic.aiTools.map((tool, ti) => (
                <span key={ti} style={{ background: tool.color+"22", color: tool.color, border:"1px solid "+tool.color+"44", borderRadius:12, padding:"2px 8px", fontSize:11, fontWeight:600 }}>
                  {tool.name} <span style={{ opacity:0.7, fontWeight:400 }}>{tool.tags[0]}</span>
                </span>
              ))}
            </div>
          )}
        </div>
        <div style={{ overflowY:"auto", padding:"12px 16px 40px", flex:1 }}>
          {groups.length === 0 ? (
            <div style={{ textAlign:"center", padding:"32px", color:"#8b949e" }}>沒有找到相關對話</div>
          ) : Object.entries(byDate).sort(([a],[b])=>a.localeCompare(b)).map(([date, dateGroups]) => (
            <div key={date} style={{ marginBottom:20 }}>
              <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:12, position:"sticky", top:0, background:"#161b22", paddingTop:4, paddingBottom:4, zIndex:1 }}>
                <div style={{ flex:1, height:1, background:"#21262d" }} />
                <div style={{ background:color+"22", color, borderRadius:20, padding:"3px 12px", fontSize:12, fontWeight:600 }}>📅 {date}</div>
                <div style={{ flex:1, height:1, background:"#21262d" }} />
              </div>
              {dateGroups.map((group, gi) => (
                <div key={gi} style={{ marginBottom:14 }}>
                  {gi > 0 && <div style={{ textAlign:"center", color:"#30363d", fontSize:11, margin:"6px 0 10px" }}>· · ·</div>}
                  {group.messages.map((msg, mi) => (
                    <div key={mi} style={{ marginBottom:8, display:"flex", gap:8, alignItems:"flex-start" }}>
                      <div style={{ flexShrink:0, background:color+"33", color, borderRadius:"50%", width:28, height:28, display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:700 }}>{msg.sender.slice(0,1)}</div>
                      <div style={{ flex:1, background:"#0d1117", borderRadius:"4px 12px 12px 12px", padding:"8px 12px" }}>
                        <div style={{ fontSize:11, color, fontWeight:600, marginBottom:3 }}>{msg.sender}</div>
                        <div style={{ fontSize:13, color:"#c9d1d9", lineHeight:1.6 }}>{msg.text}</div>
                      </div>
                    </div>
                  ))}
                </div>
              ))}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [tab, setTab] = useState("input");
  const [chatText, setChatText] = useState("");
  const [communityName, setCommunityName] = useState("");
  const [records, setRecords] = useState(loadRecords);
  const [selectedRecord, setSelectedRecord] = useState(null);
  const [error, setError] = useState("");
  const [searchQ, setSearchQ] = useState("");
  const [parsedDays, setParsedDays] = useState(null);
  const [selectedDays, setSelectedDays] = useState(new Set());
  const [charCount, setCharCount] = useState(0);
  const [openTopic, setOpenTopic] = useState(null);
  const [showSettings, setShowSettings] = useState(false);
  const [customTopics, setCustomTopics] = useState(loadCustomTopics);
  const [newTopicTitle, setNewTopicTitle] = useState("");
  const [newTopicEmoji, setNewTopicEmoji] = useState("🔖");
  const [newTopicWords, setNewTopicWords] = useState("");

  useEffect(() => { saveRecords(records); }, [records]);
  useEffect(() => { saveCustomTopics(customTopics); }, [customTopics]);

  function handleTextChange(val) {
    setChatText(val); setCharCount(val.length);
    if (val.length > 50) {
      const days = parseLineExport(val);
      if (days.size > 0) {
        // 只保留最近 30 天
        const cutoff = new Date();
        cutoff.setDate(cutoff.getDate() - 30);
        const filtered = new Map();
        for (const [day, data] of days.entries()) {
          const parts = day.split("/");
          const d = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
          if (d >= cutoff) filtered.set(day, data);
        }
        const finalMap = filtered.size > 0 ? filtered : days; // 若全部超過30天則全顯示
        setParsedDays(finalMap);
        setSelectedDays(new Set([Array.from(finalMap.keys()).pop()]));
      }
      else { setParsedDays(null); setSelectedDays(new Set()); }
    } else { setParsedDays(null); setSelectedDays(new Set()); }
  }

  function handleAnalyze() {
    if (!parsedDays || selectedDays.size === 0) { setError("請先貼入 Line 對話，並選擇日期"); return; }
    const sortedDays = Array.from(selectedDays).sort();
    const merged = { messages: [], senders: new Set() };
    for (const day of sortedDays) { if (!parsedDays.has(day)) continue; const d = parsedDays.get(day); merged.messages.push(...d.messages); d.senders.forEach(s => merged.senders.add(s)); }
    if (!merged.messages.length) { setError("選取的日期沒有偵測到有效訊息"); return; }
    setError("");
    const dateLabel = sortedDays.length===1 ? sortedDays[0] : sortedDays[0]+" ~ "+sortedDays[sortedDays.length-1]+"（共"+sortedDays.length+"天）";
    const analysis = analyzeLocally(merged, dateLabel);
    const record = { id: Date.now().toString(), community: communityName||"我的 Line 社群", date: dateLabel.replace(/\//g,"-"), createdAt: new Date().toISOString(), msgCount: merged.messages.length, analysis };
    setRecords(prev => [record, ...prev]);
    setSelectedRecord(record);
    setTab("detail");
  }

  const filteredRecords = records.filter(r => r.community.includes(searchQ)||r.date.includes(searchQ));
  function deleteRecord(id) { setRecords(prev=>prev.filter(r=>r.id!==id)); if (selectedRecord?.id===id) { setSelectedRecord(null); setTab("history"); } }
  const totalSelectedMsgs = parsedDays ? Array.from(selectedDays).reduce((acc,d)=>acc+(parsedDays.get(d)?.messages.length||0),0) : 0;

  const S = {
    page: { minHeight:"100vh", background:"#0d1117", color:"#e6edf3", fontFamily:"'PingFang TC','Noto Sans TC',sans-serif" },
    header: { background:"linear-gradient(135deg,#00b900,#06c755)", padding:"20px 20px 0", overflow:"hidden", position:"relative" },
    tabBtn: (a) => ({ padding:"7px 16px", borderRadius:"20px 20px 0 0", border:"none", cursor:"pointer", fontSize:13, fontWeight:a?700:400, background:a?"#0d1117":"rgba(255,255,255,0.2)", color:a?"#00b900":"#fff", marginTop:12, display:"inline-block" }),
    body: { padding:"20px 20px 40px", maxWidth:800, margin:"0 auto" },
    input: { width:"100%", padding:"10px 12px", background:"#161b22", border:"1px solid #30363d", borderRadius:8, color:"#e6edf3", fontSize:14, boxSizing:"border-box" },
    card: (ex) => ({ background:"#161b22", border:"1px solid #21262d", borderRadius:10, padding:"14px 16px", marginBottom:12, ...(ex||{}) }),
    btn: (d) => ({ width:"100%", padding:14, background:d?"#21262d":"linear-gradient(135deg,#00b900,#06c755)", border:"none", borderRadius:10, color:d?"#8b949e":"#fff", fontSize:15, fontWeight:700, cursor:d?"not-allowed":"pointer" }),
    label: { fontSize:12, color:"#8b949e", display:"block", marginBottom:5 },
    tag: (c) => ({ background:c+"22", color:c, borderRadius:12, padding:"2px 10px", fontSize:11 }),
    chip: { background:"#21262d", borderRadius:20, padding:"2px 10px", fontSize:11, color:"#8b949e" },
  };

  return (
    <div style={S.page}>
      {openTopic && <ConvDrawer topic={openTopic.topic} color={openTopic.color} onClose={() => setOpenTopic(null)} />}
      <div style={S.header}>
        <div style={{ position:"absolute", top:-30, right:-30, width:150, height:150, borderRadius:"50%", background:"rgba(255,255,255,0.08)" }} />
        <div style={{ display:"flex", alignItems:"center", gap:12, position:"relative" }}>
          <span style={{ fontSize:30 }}>💬</span>
          <div>
            <h1 style={{ margin:0, fontSize:19, fontWeight:700, color:"#fff" }}>Line 社群彙整</h1>
            <p style={{ margin:"2px 0 0", fontSize:12, color:"rgba(255,255,255,0.85)" }}>本機分析・不需網路・點主題看原文</p>
          </div>
          <div style={{ marginLeft:"auto", background:"rgba(255,255,255,0.2)", borderRadius:20, padding:"4px 12px", fontSize:12, color:"#fff" }}>共 {records.length} 筆</div>
        </div>
        <div style={{ display:"flex", gap:6, marginTop:4 }}>
          {[["input","📥 新增"],["history","📚 記錄"],...(selectedRecord?[["detail","📊 詳情"]]:[]),["settings","⚙️ 設定"]].map(([k,l]) => (
            <button key={k} onClick={() => setTab(k)} style={S.tabBtn(tab===k)}>{l}</button>
          ))}
        </div>
      </div>
      <div style={S.body}>

        {tab === "input" && (
          <div>
            <div style={{ marginBottom:14 }}>
              <label style={S.label}>社群名稱（選填）</label>
              <input value={communityName} onChange={e => setCommunityName(e.target.value)} placeholder="例：設計師交流社群" style={S.input} />
            </div>
            <div style={{ marginBottom:14 }}>
              <label style={S.label}>貼入 Line 匯出的聊天記錄 {charCount > 0 && <span style={{ marginLeft:8, color:"#8b949e" }}>{charCount.toLocaleString()} 字</span>}</label>
              <textarea value={chatText} onChange={e => handleTextChange(e.target.value)} placeholder={"貼入從 Line 匯出的聊天記錄…\n系統自動偵測日期讓你選擇分析哪一天。"} rows={8} style={{ ...S.input, resize:"vertical", lineHeight:1.6 }} />
            </div>
            {parsedDays && parsedDays.size > 0 && (
              <div style={{ background:"#0d2818", border:"1px solid #1f4a2e", borderRadius:10, padding:"14px 16px", marginBottom:14 }}>
                <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:10 }}>
                  <div style={{ fontSize:13, color:"#4ade80", fontWeight:600 }}>✅ 偵測到 {parsedDays.size} 天，可多選：</div>
                  <div style={{ display:"flex", gap:6 }}>
                    <button onClick={() => setSelectedDays(new Set(parsedDays.keys()))} style={{ padding:"4px 10px", borderRadius:12, border:"1px solid #4ade80", background:"transparent", color:"#4ade80", fontSize:11, cursor:"pointer" }}>全選</button>
                    <button onClick={() => setSelectedDays(new Set())} style={{ padding:"4px 10px", borderRadius:12, border:"1px solid #6e7681", background:"transparent", color:"#6e7681", fontSize:11, cursor:"pointer" }}>清除</button>
                  </div>
                </div>
                <div style={{ display:"flex", flexWrap:"wrap", gap:8, marginBottom:10 }}>
                  {Array.from(parsedDays.entries()).map(([day, data]) => {
                    const isSel = selectedDays.has(day);
                    return (
                      <button key={day} onClick={() => { const n=new Set(selectedDays); if(isSel)n.delete(day);else n.add(day); setSelectedDays(n); }}
                        style={{ padding:"7px 14px", borderRadius:20, cursor:"pointer", fontSize:12, color:"#e6edf3", position:"relative", border:isSel?"2px solid #00b900":"1px solid #30363d", background:isSel?"#00b900":"#161b22" }}>
                        {day} <span style={{ fontSize:11, opacity:0.75 }}>({data.messages.length}則)</span>
                        {isSel && <span style={{ position:"absolute", top:-6, right:-6, background:"#fff", color:"#00b900", borderRadius:"50%", width:14, height:14, fontSize:10, display:"flex", alignItems:"center", justifyContent:"center", fontWeight:700 }}>✓</span>}
                      </button>
                    );
                  })}
                </div>
                {selectedDays.size > 0 && (
                  <div style={{ fontSize:12, color:"#8b949e", borderTop:"1px solid #1f4a2e", paddingTop:8 }}>
                    已選 <strong style={{ color:"#4ade80" }}>{selectedDays.size}</strong> 天・共 <strong style={{ color:"#4ade80" }}>{totalSelectedMsgs}</strong> 則
                    {selectedDays.size > 1 && <span style={{ marginLeft:6, color:"#fbbf24" }}>（將合併分析）</span>}
                  </div>
                )}
              </div>
            )}
            {!parsedDays && chatText.length > 50 && (
              <div style={{ background:"#1c1208", border:"1px solid #5a3e1b", borderRadius:10, padding:"12px 16px", marginBottom:14 }}>
                <div style={{ fontSize:13, color:"#fbbf24", marginBottom:4 }}>⚠️ 偵測不到日期格式</div>
                <div style={{ fontSize:12, color:"#8b949e" }}>請確認是否完整複製，Line 匯出記錄第一行通常是日期如「2026/06/03」。</div>
              </div>
            )}
            {error && <div style={{ background:"#2d1717", border:"1px solid #f85149", borderRadius:8, padding:"10px 14px", marginBottom:14, color:"#f85149", fontSize:13 }}>⚠️ {error}</div>}
            <button onClick={handleAnalyze} disabled={selectedDays.size===0} style={S.btn(selectedDays.size===0)}>
              {selectedDays.size===0?"⚡ 請先選擇日期":selectedDays.size===1?"⚡ 分析 "+Array.from(selectedDays)[0]:"⚡ 合併分析 "+selectedDays.size+" 天"}
            </button>
            <div style={{ ...S.card(), marginTop:16, fontSize:12, color:"#8b949e" }}>
              <strong style={{ color:"#58a6ff" }}>📌 Line 匯出方法</strong>
              <div style={{ marginTop:6, lineHeight:2.2 }}>1. 開啟社群聊天室<br/>2. 右上角 ⋮ → 其他 → 傳送聊天記錄<br/>3. 選擇期間 → 以文字傳送<br/>4. 複製全部文字，貼入上方</div>
            </div>
          </div>
        )}

        {tab === "history" && (
          <div>
            <div style={{ marginBottom:14 }}><input value={searchQ} onChange={e=>setSearchQ(e.target.value)} placeholder="🔍 搜尋社群或日期…" style={S.input} /></div>
            {filteredRecords.length === 0 ? (
              <div style={{ textAlign:"center", padding:"48px 20px", color:"#8b949e" }}><div style={{ fontSize:48, marginBottom:12 }}>📭</div><div>還沒有記錄</div></div>

                  <div style={{ flex:1 }}>
                    <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6 }}>
                      <span style={{ background:COLORS[i%COLORS.length], width:8, height:8, borderRadius:"50%", display:"inline-block", flexShrink:0 }} />
                      <span style={{ fontWeight:600, fontSize:15 }}>{r.community}</span>

                    <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
                      {(r.analysis?.topics||[]).slice(0,3).map((t,j) => <span key={j} style={S.chip}>{t.emoji} {t.title}</span>)}

                  <button onClick={e=>{e.stopPropagation();deleteRecord(r.id);}} style={{ background:"none", border:"none", color:"#6e7681", cursor:"pointer", fontSize:16, paddingLeft:8, flexShrink:0 }}>🗑️</button>
                </div>
                <div style={{ fontSize:11, color:"#30363d", marginTop:8 }}>{r.msgCount} 則・{fmtDate(r.createdAt)} {fmtTime(r.createdAt)}</div>
              </div>
            ))}
          </div>
        )}

        {tab === "detail" && selectedRecord && (
          <div>
            <div style={{ background:"linear-gradient(135deg,#0d2818,#0d2218)", border:"1px solid #1f4a2e", borderRadius:12, padding:"18px 20px", marginBottom:16 }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                <div><h2 style={{ margin:"0 0 4px", fontSize:18, fontWeight:700 }}>{selectedRecord.community}</h2><div style={{ fontSize:13, color:"#8b949e" }}>📅 {selectedRecord.date}</div></div>
                <div style={{ textAlign:"right" }}><div style={{ fontSize:26 }}>{selectedRecord.analysis?.moodEmoji}</div><div style={{ fontSize:12, color:"#8b949e" }}>{selectedRecord.analysis?.mood}</div></div>
              </div>
              <p style={{ margin:"12px 0 0", fontSize:14, color:"#c9d1d9", lineHeight:1.7 }}>{selectedRecord.analysis?.summary}</p>
              <div style={{ display:"flex", gap:20, marginTop:12 }}>
                <div style={{ fontSize:12, color:"#8b949e" }}>💬 <strong style={{ color:"#e6edf3" }}>{selectedRecord.analysis?.totalMessages}</strong> 則</div>
                <div style={{ fontSize:12, color:"#8b949e" }}>👥 <strong style={{ color:"#e6edf3" }}>{selectedRecord.analysis?.participantCount}</strong> 人</div>
              </div>
            </div>
            {selectedRecord.analysis?.topWords?.length > 0 && (
              <div style={{ ...S.card(), marginBottom:16 }}>
                <div style={{ fontSize:13, fontWeight:600, color:"#8b949e", marginBottom:10 }}>🔑 熱門關鍵字</div>
                <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
                  {selectedRecord.analysis.topWords.map((w,i) => <span key={i} style={{ ...S.tag(COLORS[i%COLORS.length]), fontSize:13, padding:"4px 12px" }}>{w}</span>)}

              </div>
            )}
            <div style={{ fontSize:13, fontWeight:600, color:"#8b949e", marginBottom:6 }}>📌 討論主題</div>
            <div style={{ fontSize:11, color:"#4ade80", marginBottom:10 }}>👆 點主題卡片可查看該分類下的完整對話</div>
            <div style={{ display:"flex", flexDirection:"column", gap:10, marginBottom:16 }}>

                  </div>

                  <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom: t.aiTools?.length ? 8 : 0 }}>
                    {(t.keywords||[]).map((kw,j) => <span key={j} style={S.tag(COLORS[i%COLORS.length])}>#{kw}</span>)}

                      <span style={{ fontSize:10, color:"#6e7681", alignSelf:"center", marginRight:2 }}>🤖 偵測到</span>
                      {t.aiTools.map((tool, ti) => (
                        <span key={ti} style={{ background: tool.color+"22", color: tool.color, border:"1px solid "+tool.color+"44", borderRadius:12, padding:"2px 8px", fontSize:11, fontWeight:600 }}>

                <div key={i} style={{ display:"flex", gap:10, padding:"8px 0", borderBottom:i<arr.length-1?"1px solid #21262d":"none" }}>
                  <span style={{ color:"#00b900", fontWeight:700, flexShrink:0 }}>✓</span>
                  <span style={{ fontSize:14, color:"#c9d1d9", lineHeight:1.6 }}>{h}</span>
                </div>
              ))}
            </div>
            {selectedRecord.analysis?.topSenders?.length > 0 && (
              <div>
                <div style={{ fontSize:13, fontWeight:600, color:"#8b949e", marginBottom:10 }}>🏆 最活躍成員</div>
                <div style={S.card()}>
                  {selectedRecord.analysis.topSenders.map(([name,count],i) => (
                    <div key={i} style={{ display:"flex", alignItems:"center", gap:10, padding:"8px 0", borderBottom:i<selectedRecord.analysis.topSenders.length-1?"1px solid #21262d":"none" }}>
                      <span style={{ fontSize:18 }}>{"🥇🥈🥉"[i]}</span>
                      <span style={{ flex:1, fontSize:14 }}>{name}</span>
                      <span style={S.chip}>{count} 則</span>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
